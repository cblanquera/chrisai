name: ChrisAI Test Suite
on: ["push", "pull_request"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26.x'
      - name: Install dependencies
        run: npm i
      - name: Run Tests
        run: npm run test